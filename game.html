<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="game.css">
    <script src="game.js"></script>
    <title>Floppy Birb - Game</title>
</head>
<body onload="startGame()">
    
    <!-- Header -->
    <header class="game-header">
        <div class="game-header-content">
            <h1>Floppy Birb</h1>
            <p>Navigate through the obstacles and beat your high score!</p>
        </div>
    </header>

    <!-- Game Container -->
    <div class="game-container">
        <!-- Score Display -->
        <div class="score-display">
            <div class="score-item">
                <p>Current Score</p>
                <span class="score-value" id="scoreValue">0</span>
            </div>
            <div class="score-item">
                <p>High Score</p>
                <span class="score-value" id="highScoreValue">0</span>
            </div>
        </div>

        <!-- Game Canvas inserted here by JavaScript -->

        <!-- Instructions -->
        <div class="game-instructions">
            <p>Press <strong>SPACE</strong> to start</p>
            <p>Press <strong>SPACE</strong> again after losing to restart</p>
        </div>

        <!-- Navigation -->
        <div class="game-nav">
            <a href="index.html" class="back-button">← Back to Home</a>
        </div>
    </div>
    
</body>
</html>
